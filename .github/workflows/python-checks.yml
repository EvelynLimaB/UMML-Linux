name: Python checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile source
        run: python -m py_compile UMML.py UMML_core.py umml_platform.py
      - name: Run platform tests
        run: python -m unittest discover -s tests -v
      - name: Validate scripts
        run: bash -n install.sh uninstall.sh scripts/build_release.sh
      - name: Build distributable archives
        run: scripts/build_release.sh
