name: UMML Manager checks

on:
  push:
    branches:
      - agent/umml-manager-foundation
      - agent/umml-runtime-bridge
  pull_request:
    paths:
      - 'umml_manager/**'
      - 'umml_manager_packaged.py'
      - 'tests/test_manager.py'
      - 'MANAGER_VERSION'
      - 'MANAGER_README.md'
      - 'MANAGER_CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'install-manager.sh'
      - 'uninstall-manager.sh'
      - 'scripts/check_manager.sh'
      - 'scripts/build_manager_*.sh'
      - 'packaging/pyinstaller/umml-manager.spec'
      - 'packaging/linux/io.github.evelynlimab.ummlmanager.*'
      - 'assets/umml-manager.svg'
      - '.github/pull_request_template.md'
      - '.github/workflows/manager-checks.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manager-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install metadata validators
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils appstream-util
      - name: Run manager validation
        run: bash scripts/check_manager.sh

  manager-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install package build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev python3-tk
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt -r requirements-build.txt
      - name: Build frozen manager
        run: bash scripts/build_manager_frozen.sh
      - name: Build separate Debian package
        run: bash scripts/build_manager_deb.sh
      - name: Inspect package
        run: |
          PACKAGE="$(find dist -maxdepth 1 -name 'umml-manager_*_amd64.deb' -print -quit)"
          test -n "$PACKAGE"
          test "$(dpkg-deb --field "$PACKAGE" Package)" = 'umml-manager'
          test "$(dpkg-deb --field "$PACKAGE" Architecture)" = 'amd64'
          dpkg-deb --info "$PACKAGE"
          dpkg-deb --contents "$PACKAGE"
      - uses: actions/upload-artifact@v4
        with:
          name: umml-manager-deb
          path: dist/umml-manager_*_amd64.deb
          if-no-files-found: error
          retention-days: 30
