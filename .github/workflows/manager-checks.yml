name: UMML Manager checks

on:
  push:
    branches:
      - agent/umml-manager-foundation
      - agent/umml-runtime-bridge
  pull_request:
    paths:
      - 'umml_manager/**'
      - 'umml_manager_packaged.py'
      - 'tests/test_manager*.py'
      - 'requirements.txt'
      - 'MANAGER_VERSION'
      - 'MANAGER_README.md'
      - 'MANAGER_CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'install-manager.sh'
      - 'uninstall-manager.sh'
      - 'scripts/audit_manager.py'
      - 'scripts/check_manager.sh'
      - 'scripts/build_manager_*.sh'
      - 'packaging/pyinstaller/umml-manager.spec'
      - 'packaging/linux/io.github.evelynlimab.ummlmanager.*'
      - 'packaging/appimage/io.github.evelynlimab.ummlmanager.desktop'
      - 'assets/umml-manager.svg'
      - '.github/pull_request_template.md'
      - '.github/workflows/manager-checks.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manager-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install metadata validators
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils appstream-util
      - name: Compile every manager Python file
        run: |
          python -m compileall -q \
            umml_manager \
            umml_manager_packaged.py \
            tests \
            scripts/audit_manager.py
      - name: Audit source structure and dangerous calls
        run: python scripts/audit_manager.py
      - name: Run manager regression tests
        run: python -m unittest discover -s tests -p 'test_manager*.py' -v
      - name: Validate shell and desktop metadata
        run: |
          bash -n \
            install-manager.sh \
            uninstall-manager.sh \
            scripts/build_manager_frozen.sh \
            scripts/build_manager_deb.sh \
            scripts/build_manager_appimage.sh \
            scripts/check_manager.sh
          desktop-file-validate \
            packaging/linux/io.github.evelynlimab.ummlmanager.desktop \
            packaging/appimage/io.github.evelynlimab.ummlmanager.desktop
          appstream-util validate-relax \
            packaging/linux/io.github.evelynlimab.ummlmanager.metainfo.xml

  manager-packages:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install package build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream-util \
            curl \
            desktop-file-utils \
            dpkg-dev \
            file \
            python3-tk
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt -r requirements-build.txt
      - name: Build frozen manager
        run: bash scripts/build_manager_frozen.sh
      - name: Build Debian package
        run: bash scripts/build_manager_deb.sh
      - name: Build AppImage
        run: bash scripts/build_manager_appimage.sh
      - name: Inspect both package formats
        run: |
          set -Eeuo pipefail
          VERSION="$(tr -d '[:space:]' < MANAGER_VERSION)"
          DISPLAY_VERSION="$(printf '%s' "$VERSION" | tr '~' '-')"
          EXPECTED_DEB="dist/umml-manager_${VERSION}_amd64.deb"
          EXPECTED_APPIMAGE="dist/umml-manager_${DISPLAY_VERSION}_x86_64.AppImage"
          DEB="$(find dist -maxdepth 1 -name 'umml-manager_*_amd64.deb' -print -quit)"
          APPIMAGE="$(find dist -maxdepth 1 -name 'umml-manager_*_x86_64.AppImage' -print -quit)"
          test "$DEB" = "$EXPECTED_DEB"
          test "$APPIMAGE" = "$EXPECTED_APPIMAGE"
          test "$(dpkg-deb --field "$DEB" Package)" = 'umml-manager'
          test "$(dpkg-deb --field "$DEB" Version)" = "$VERSION"
          test "$(dpkg-deb --field "$DEB" Architecture)" = 'amd64'
          dpkg-deb --info "$DEB"
          dpkg-deb --contents "$DEB"
          file "$APPIMAGE" | grep -q 'ELF 64-bit'
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --version
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --cli --help >/dev/null

          VERIFY_ROOT="$(mktemp -d)"
          trap 'rm -rf "$VERIFY_ROOT"' EXIT
          mkdir -p "$VERIFY_ROOT/deb"
          dpkg-deb -x "$DEB" "$VERIFY_ROOT/deb"
          (
            cd "$VERIFY_ROOT"
            "$GITHUB_WORKSPACE/$APPIMAGE" --appimage-extract >/dev/null
          )
          diff -qr \
            build/manager-frozen/umml-manager \
            "$VERIFY_ROOT/deb/usr/lib/umml-manager"
          diff -qr \
            build/manager-frozen/umml-manager \
            "$VERIFY_ROOT/squashfs-root/usr/lib/umml-manager"
          diff -qr \
            "$VERIFY_ROOT/deb/usr/lib/umml-manager" \
            "$VERIFY_ROOT/squashfs-root/usr/lib/umml-manager"
          find "$VERIFY_ROOT/deb/usr/lib/umml-manager" \
            -type f -path '*/certifi/cacert.pem' -print -quit | grep -q .
          find "$VERIFY_ROOT/squashfs-root/usr/lib/umml-manager" \
            -type f -path '*/certifi/cacert.pem' -print -quit | grep -q .
          rm -rf "$VERIFY_ROOT"
          trap - EXIT

          (
            cd dist
            sha256sum \
              "$(basename "$DEB")" \
              "$(basename "$APPIMAGE")" \
              > SHA256SUMS
            sha256sum -c SHA256SUMS
          )
      - uses: actions/upload-artifact@v4
        with:
          name: umml-manager-deb
          path: dist/umml-manager_*_amd64.deb
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: umml-manager-appimage
          path: dist/umml-manager_*_x86_64.AppImage
          if-no-files-found: error
          retention-days: 30
      - uses: actions/upload-artifact@v4
        with:
          name: umml-manager-checksums
          path: dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
